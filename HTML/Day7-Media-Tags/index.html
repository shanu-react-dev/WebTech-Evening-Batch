<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Tags in HTML</title>
  </head>
  <body>
    <h1>Media Tags in HTML</h1>
    <img
      src="https://cdn.pixabay.com/photo/2026/04/02/10/59/gruendercoach-robin-10205230_1280.jpg"
      alt="bird image"
      height="200px"
      width="200px"
    />

    <img
      src="./jackielsy-dog-9830825.jpg"
      height="200px"
      width="350px"
      alt="my dog"
    />

    <audio
      src="./Unakkul Naane - RaagTune.mp3"
      controls
      loop
      autoplay
      muted
    ></audio>

    <video
      src="./24515-343454414.mp4"
      height="400px"
      width="550px"
      controls
      loop
      autoplay
      muted
    ></video>

    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/Vi9bxu-M-ag?si=UFdP6meHYnCCcw-Z"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d972.0524274235651!2d80.14100580344021!3d12.958428626930253!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a525e4ca559c68f%3A0x1e3e6d4bcd550206!2sQSpiders%20Chennai%20Chromepet!5e0!3m2!1sen!2sin!4v1776348442533!5m2!1sen!2sin"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </body>
</html>
